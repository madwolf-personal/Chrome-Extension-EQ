<!DOCTYPE html>
<html>
  <head>
    <title>Global EQ</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    
    <!-- Top Bar -->
    <div class="main-controls">
      <button id="toggleBtn" class="primary">Enable EQ</button>
      
      <div class="band-selector">
        <label>Bands:</label>
        <button id="decBandBtn" class="adjust-btn">-</button>
        <input type="number" id="bandCountInput" min="5" max="20" value="10" readonly />
        <button id="incBandBtn" class="adjust-btn">+</button>
      </div>

      <button id="resetBtn">Reset</button>
    </div>

    <!-- Presets -->
    <div class="preset-controls">
      <select id="presetList">
        <option value="" disabled selected>Select...</option>
      </select>
      <button id="loadPresetBtn">Load</button>
      <button id="deletePresetBtn" class="danger" title="Delete Preset">Del</button>
      
      <div class="divider"></div>
      
      <input type="text" id="presetNameInput" placeholder="Name..." />
      <button id="savePresetBtn">Save</button>
    </div>

    <!-- Audio Interface -->
    <div class="audio-interface">
      <!-- Pre-Amp -->
      <div class="preamp-section">
        <div class="band">
          <!-- 1. Value Top -->
          <input type="number" id="preAmpInput" class="gain-input" value="0" />
          
          <!-- 2. Slider Middle -->
          <input type="range" id="preAmpSlider" min="-12" max="12" step="0.1" value="0" />
          
          <!-- 3. Buttons Bottom -->
          <button id="preAmpUp" class="gain-btn">+</button>
          <button id="preAmpDown" class="gain-btn">-</button>
          
          <!-- 4. Label -->
          <span class="freq-label pre-label">PRE</span>
          
          <!-- 5. NEW RESET BUTTON -->
          <button id="preAmpReset" class="band-reset-btn" title="Reset to 0"></button>
        </div>
      </div>

      <div class="section-divider"></div>

      <!-- EQ Bands (Generated via JS) -->
      <div class="eq-container" id="eqContainer"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
